<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャンペーン応募フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://yubinbango.github.io/yubinbango/yubinbango.js" charset="UTF-8"></script>
    <style>
        .loading { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 py-10">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-md h-adr">
        <span class="p-country-name" style="display:none;">Japan</span>
        
        <h1 class="text-2xl font-bold text-center mb-8 text-blue-900">キャンペーン応募</h1>

        <div id="form-container" class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-1">お名前 (姓名) *</label>
                <input type="text" id="name" class="w-full border border-gray-300 rounded px-3 py-2" placeholder="田中 太郎">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">メールアドレス (Email) *</label>
                <input type="email" id="email" class="w-full border border-gray-300 rounded px-3 py-2" placeholder="example@mail.jp">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">電話番号 *</label>
                <input type="tel" id="phone" class="w-full border border-gray-300 rounded px-3 py-2" placeholder="09012345678">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">ご住所 *</label>
                <div class="flex space-x-2 mb-2">
                    <span class="py-2">〒</span>
                    <input type="text" id="postcode" class="p-postal-code w-32 border border-gray-300 rounded px-3 py-2" placeholder="1234567">
                </div>
                <input type="text" id="address" class="p-region p-locality p-street-address p-extended-address w-full border border-gray-300 rounded px-3 py-2" placeholder="自動入力されます">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1">製品シリアル番号 (S/N) *</label>
                <input type="text" id="serialNumber" class="w-full border border-gray-300 rounded px-3 py-2" placeholder="例: SN12345678">
            </div>

            <div class="grid grid-cols-1 gap-4 border-t pt-4">
                <div>
                    <label class="block text-sm font-medium mb-1">シリアル番号の写真 *</label>
                    <input type="file" id="img1" accept="image/*" class="text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">購入証明 (領収書など) *</label>
                    <input type="file" id="img2" accept="image/*" class="text-sm">
                </div>
            </div>

            <button onclick="submitData()" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded mt-6 flex justify-center items-center">
                <span>応募する</span>
                <div id="loader" class="hidden loading ml-3 w-5 h-5 border-2 border-white rounded-full"></div>
            </button>
        </div>

        <div id="success-msg" class="hidden text-center py-10">
            <h2 class="text-2xl font-bold text-green-600">応募完了！</h2>
            <p class="mt-4 text-gray-600">ご応募ありがとうございました。</p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwDBkyoFzV09IIMmJjyxyfzqKvpNnTziPYYVX1vhgGbBHOLa05ayUdzLm6-AIu5ncqt/exec";

        const compressImage = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                };
            };
        });

        async function submitData() {
            // 基本驗證
            const email = document.getElementById('email').value;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) { alert("Email 格式不正確"); return; }
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            try {
                const payload = {
                    name: document.getElementById('name').value,
                    email: email,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    serialNumber: document.getElementById('serialNumber').value,
                    img1Data: await compressImage(document.getElementById('img1').files[0]),
                    img1Type: 'image/jpeg',
                    img2Data: await compressImage(document.getElementById('img2').files[0]),
                    img2Type: 'image/jpeg'
                };

                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-msg').classList.remove('hidden');
            } catch (e) {
                alert("送信失敗");
                btn.disabled = false;
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
