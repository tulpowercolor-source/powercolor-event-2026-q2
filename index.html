<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerColor 日本活動登錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center">グラフィックボード購入特典応募</h1>
        
        <form id="uploadForm" class="space-y-4">
            <div>
                <label class="block font-medium">氏名 (全角)</label>
                <input type="text" id="name" name="name" required class="w-full border p-2 rounded">
            </div>
            
            <div>
                <label class="block font-medium">メールアドレス</label>
                <input type="email" id="email" name="email" required class="w-full border p-2 rounded">
            </div>
            
            <div>
                <label class="block font-medium">電話番号</label>
                <input type="tel" id="phone" name="phone" required placeholder="090-0000-0000" class="w-full border p-2 rounded">
            </div>

            <div>
                <label class="block font-medium">配送先住所</label>
                <textarea id="address" name="address" required class="w-full border p-2 rounded"></textarea>
            </div>

            <div>
                <label class="block font-medium">シリアル番号ステッカーの写真</label>
                <input type="file" id="file1" accept="image/*" required class="w-full">
            </div>

            <div>
                <label class="block font-medium">ご購入証明書 (レシート等)</label>
                <input type="file" id="file2" accept="image/*" required class="w-full">
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-red-600 text-white font-bold py-3 rounded hover:bg-red-700 transition">
                応募する
            </button>
        </form>
        <div id="status" class="mt-4 text-center hidden"></div>
    </div>

    <script>
        const GAS_URL = "您的GAS網頁應用程式網址"; // 貼上剛才複製的網址

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = "送信中...";
            status.classList.remove('hidden');
            status.innerText = "処理中，少々お待ちください...";

            try {
                const file1 = document.getElementById('file1').files[0];
                const file2 = document.getElementById('file2').files[0];

                const payload = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    file1: {
                        base64: await toBase64(file1),
                        name: file1.name
                    },
                    file2: {
                        base64: await toBase64(file2),
                        name: file2.name
                    }
                };

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.result === "success") {
                    status.innerText = "応募が完了しました。ありがとうございます。";
                    document.getElementById('uploadForm').reset();
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                status.innerText = "エラーが発生しました。もう一度お試しください。";
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "応募する";
            }
        });
    </script>
</body>
</html>
