<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerColor Campaign</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://yubinbango.github.io/yubinbango/yubinbango.js" charset="UTF-8"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6LcxkK4sAAAAADZ_dMUgYMpprc8pS-hE9Rfi1owh"></script>
    <style>
        .loading { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 antialiased h-adr">
    <span class="p-country-name" style="display:none;">Japan</span>

    <div class="max-w-4xl mx-auto overflow-hidden shadow-2xl">
        <img src="https://via.placeholder.com/1200x400/111827/3b82f6?text=PowerColor+Campaign+Banner" alt="Banner" class="w-full h-auto">
    </div>

    <div class="max-w-2xl mx-auto px-4 py-10">
        <div id="form-container" class="bg-gray-900 p-8 rounded-2xl shadow-xl border border-gray-800">
            <h1 class="text-2xl font-black text-center mb-8 text-blue-500 tracking-wider">APPLICATION FORM</h1>
            
            <div class="space-y-6">
                <div style="display:none;"><input type="text" id="mid_name"></div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">お名前 *</label>
                        <input type="text" id="name" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:ring-1 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">メールアドレス *</label>
                        <input type="email" id="email" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:ring-1 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">電話番号 *</label>
                        <input type="tel" id="phone" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:ring-1 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">郵便番号 (ハイフンなし)</label>
                        <input type="text" id="postcode" class="p-postal-code w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:ring-1 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">ご住所 *</label>
                    <input type="text" id="address" class="p-region p-locality p-street-address p-extended-address w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:ring-1 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">製品シリアル番号 *</label>
                    <input type="text" id="serialNumber" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:ring-1 focus:ring-blue-500 outline-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-gray-800 p-4 rounded-lg border border-dashed border-gray-600">
                        <label class="block text-[10px] text-gray-500 mb-2 font-bold uppercase">シリアル番号の写真</label>
                        <input type="file" id="img1" accept="image/*" class="text-xs text-gray-400">
                    </div>
                    <div class="bg-gray-800 p-4 rounded-lg border border-dashed border-gray-600">
                        <label class="block text-[10px] text-gray-500 mb-2 font-bold uppercase">購入証明の画像</label>
                        <input type="file" id="img2" accept="image/*" class="text-xs text-gray-400">
                    </div>
                </div>

                <button onclick="handleFormSubmit()" id="btn-submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-4 flex justify-center items-center transition-all">
                    <span>応募を完了する</span>
                    <div id="loader" class="hidden loading ml-3 w-5 h-5 border-2 border-white rounded-full"></div>
                </button>
            </div>
        </div>

        <div id="success-msg" class="hidden bg-gray-900 p-10 rounded-2xl border border-blue-500 text-center shadow-2xl">
            <h2 class="text-2xl font-bold mb-4">応募完了</h2>
            <p class="text-gray-400 mb-8">ご応募ありがとうございました。ページを閉じてください。</p>
            <button onclick="window.close()" class="bg-gray-800 hover:bg-gray-700 text-white px-10 py-2 rounded-full border border-gray-600">閉じる</button>
        </div>

        <div class="mt-12 p-6 text-[11px] text-gray-600 border-t border-gray-800 leading-relaxed">
            <p class="font-bold text-gray-400 mb-2 text-xs">【注意事項】</p>
            <ul class="list-disc pl-5 space-y-1">
                <li>本キャンペーンは日本国内在住の方のみを対象としています。</li>
                <li>お一人様につき一回限りの応募とさせていただきます。</li>
                <li>個人情報は賞品発送の目的にのみ使用いたします。</li>
            </ul>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxqh_nP9wzjaEhrYPj0-3G7olfhiO26Ut3qgIs5qHenFolrYbBe3SiXwEqmaP7t3P_A/exec";
        const SITE_KEY = "6LcxkK4sAAAAADZ_dMUgYMpprc8pS-hE9Rfi1owh"; // 已更新

        const compressImage = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1200;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                };
            };
        });

        async function handleFormSubmit() {
            if(document.getElementById('mid_name').value) return; // HoneyPot
            const fields = ['name', 'email', 'phone', 'address', 'serialNumber'];
            for(let id of fields) if(!document.getElementById(id).value) { alert("必須項目を入力してください"); return; }
            if(!document.getElementById('img1').files[0] || !document.getElementById('img2').files[0]) { alert("画像をアップロードしてください"); return; }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            grecaptcha.ready(function() {
                grecaptcha.execute(SITE_KEY, {action: 'submit'}).then(async function(token) {
                    try {
                        const payload = {
                            recaptchaToken: token,
                            mid_name: document.getElementById('mid_name').value,
                            name: document.getElementById('name').value,
                            email: document.getElementById('email').value,
                            phone: document.getElementById('phone').value,
                            address: document.getElementById('address').value,
                            serialNumber: document.getElementById('serialNumber').value,
                            img1Data: await compressImage(document.getElementById('img1').files[0]),
                            img1Type: 'image/jpeg',
                            img2Data: await compressImage(document.getElementById('img2').files[0]),
                            img2Type: 'image/jpeg'
                        };

                        await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                        
                        document.getElementById('form-container').classList.add('hidden');
                        document.getElementById('success-msg').classList.remove('hidden');
                    } catch (e) {
                        alert("エラーが発生しました。");
                        btn.disabled = false;
                        document.getElementById('loader').classList.add('hidden');
                    }
                });
            });
        }
    </script>
</body>
</html>
